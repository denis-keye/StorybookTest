<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ── Reset & base ──────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --sb-bg0:      #0f0f10;   /* deepest – preview bg          */
    --sb-bg1:      #161618;   /* app bg / sidebar              */
    --sb-bg2:      #1c1c1f;   /* toolbar / panel bg            */
    --sb-bg3:      #26262a;   /* elevated surfaces / inputs    */
    --sb-bg4:      #2e2e34;   /* hover states                  */
    --sb-border:   rgba(255,255,255,0.07);
    --sb-text:     #e8e8ed;
    --sb-muted:    rgba(232,232,237,0.40);
    --sb-accent:   #029cfd;
    --sb-accent-glow: rgba(2,156,253,0.18);
    --sb-radius:   8px;
    --sb-radius-sm:4px;
    --sb-font:     "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --sb-mono:     "SF Mono", "Fira Code", monospace;
  }

  body { font-family: var(--sb-font) !important; }

  /* ── Sidebar ───────────────────────────────────────────────────────────── */
  /* Root container */
  #storybook-explorer-menu,
  [class*="sidebar"] {
    background: var(--sb-bg1) !important;
    border-right: 1px solid var(--sb-border) !important;
  }

  /* Story tree items */
  [data-nodetype="story"] a,
  [data-nodetype="component"] button,
  [data-nodetype="root"] button {
    border-radius: var(--sb-radius-sm) !important;
    transition: background 0.1s, color 0.1s !important;
  }
  [data-nodetype="story"] a:hover {
    background: var(--sb-bg4) !important;
  }
  [data-selected="true"] > a,
  [data-selected="true"] > button {
    background: var(--sb-accent-glow) !important;
    color: var(--sb-accent) !important;
    font-weight: 600 !important;
  }

  /* Sidebar search */
  [class*="search"] input {
    background: var(--sb-bg3) !important;
    border: 1px solid var(--sb-border) !important;
    border-radius: var(--sb-radius) !important;
    color: var(--sb-text) !important;
    font-family: var(--sb-font) !important;
    font-size: 12px !important;
    transition: border-color 0.15s !important;
  }
  [class*="search"] input:focus {
    border-color: var(--sb-accent) !important;
    outline: none !important;
    box-shadow: 0 0 0 3px var(--sb-accent-glow) !important;
  }

  /* Sidebar header brand */
  [class*="brand"],
  [class*="branding"] {
    padding: 16px 14px !important;
    font-weight: 700 !important;
    letter-spacing: -0.02em !important;
    font-size: 15px !important;
  }

  /* ── Toolbar ───────────────────────────────────────────────────────────── */
  [class*="Toolbar"],
  [role="toolbar"] {
    background: var(--sb-bg2) !important;
    border-bottom: 1px solid var(--sb-border) !important;
    height: 44px !important;
    gap: 2px !important;
    padding: 0 12px !important;
  }

  /* Toolbar buttons */
  [role="toolbar"] button,
  [class*="toolbarItem"] button {
    border-radius: var(--sb-radius-sm) !important;
    color: var(--sb-muted) !important;
    transition: background 0.1s, color 0.1s !important;
  }
  [role="toolbar"] button:hover {
    background: var(--sb-bg4) !important;
    color: var(--sb-text) !important;
  }
  [role="toolbar"] button[aria-pressed="true"],
  [role="toolbar"] button[data-active="true"] {
    background: var(--sb-accent-glow) !important;
    color: var(--sb-accent) !important;
  }

  /* ── Panel tab bar — kill all padding on the container chain ────────── */
  /* sb-bar is the direct wrapper of the tablist row */
  [class*="sb-bar"],
  #storybook-panel-root > div > div:first-child,
  [role="tablist"] > *,
  [role="tablist"] ~ * {
    padding: 0 !important;
    margin: 0 !important;
  }
  /* Force every flex ancestor of the tablist to stretch full width */
  [role="tablist"],
  [role="tablist"] > *:not([role="tab"]) {
    width: 100% !important;
    flex: 1 !important;
    min-width: 0 !important;
  }
  [role="tablist"] {
    background: var(--sb-bg2) !important;
    border-bottom: 1px solid var(--sb-border) !important;
    border-top: none !important;
    padding: 0 !important;
    margin: 0 !important;
    gap: 0 !important;
    height: 48px !important;
    display: flex !important;
    flex-direction: row !important;
    white-space: nowrap !important;
    overflow: visible !important;
    width: 100% !important;
    max-width: 100% !important;
    box-sizing: border-box !important;
  }

  [role="tab"] {
    font-family: var(--sb-mono) !important;
    font-size: 10px !important;
    font-weight: 400 !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    color: var(--sb-muted) !important;
    /* Kill ALL border variants Storybook may apply */
    border: none !important;
    border-width: 0 !important;
    border-style: none !important;
    border-bottom: none !important;
    border-radius: 0 !important;
    padding: 0 12px !important;
    height: 48px !important;
    line-height: 48px !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 6px !important;
    transition: color 0.1s, background 0.1s !important;
    background: transparent !important;
    position: relative !important;
    flex: 1 !important;
    white-space: nowrap !important;
    outline: none !important;
    box-shadow: none !important;
    text-decoration: none !important;
  }
  [role="tab"]:hover {
    color: var(--sb-text) !important;
    background: rgba(255,255,255,0.04) !important;
  }
  [role="tab"][aria-selected="true"],
  [role="tab"].tabbutton-active,
  button[class*="tabbutton-active"] {
    color: var(--sb-accent) !important;
    border: none !important;
    border-width: 0 !important;
    border-style: none !important;
    border-bottom: none !important;
    background: rgba(2,156,253,0.06) !important;
    box-shadow: none !important;
  }

  /* Kill ALL pill/badge styling inside tabs — target every span descendant */
  [role="tab"] span,
  [role="tab"] span span {
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    padding: 0 !important;
    min-width: unset !important;
    height: auto !important;
    line-height: inherit !important;
  }
  [role="tab"] span {
    font-family: var(--sb-mono) !important;
    font-size: 10px !important;
    letter-spacing: 0.06em !important;
    text-transform: uppercase !important;
    color: var(--sb-muted) !important;
  }
  [role="tab"][aria-selected="true"] span {
    color: var(--sb-accent) !important;
  }

  /* ── Panel / addon surface ────────────────────────────────────────────── */
  /* Scoped tightly — avoid hitting preview/canvas wrappers */
  #storybook-panel-root,
  [data-role="panel"] {
    background: var(--sb-bg1) !important;
  }

  /* ── Scrollbars ───────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.22);
  }

  /* ── Controls addon table ─────────────────────────────────────────────── */
  table[class*="controls"] td,
  table[class*="controls"] th {
    font-family: var(--sb-font) !important;
    font-size: 12px !important;
    border-color: var(--sb-border) !important;
  }
  table[class*="controls"] tr:hover td {
    background: var(--sb-bg3) !important;
  }

  /* ── Suppress source/docs code flash on initial load ─────────────────── */
  /* The source addon briefly shows a code block before the panel switches */
  [id*="source"] pre,
  [id*="source"] code,
  [class*="source"] pre,
  [class*="source"] code,
  [class*="Source"] pre,
  [class*="Source"] code {
    visibility: hidden;
  }
  /* Once the panel is active (aria-selected on its tab), reveal it */
  [aria-selected="true"][id*="source"] ~ * pre,
  [aria-selected="true"][id*="source"] ~ * code {
    visibility: visible;
  }

  /* ── Canvas frame ─────────────────────────────────────────────────────── */
  #storybook-preview-wrapper {
    background: var(--sb-bg0) !important;
  }

  /* ── Focus rings ─────────────────────────────────────────────────────── */
  *:focus-visible {
    outline: 2px solid var(--sb-accent) !important;
    outline-offset: 2px !important;
  }
</style>

<script>
  /* Remove any persisted SB layout so panelPosition:'right' from manager.ts always wins */
  try {
    Object.keys(localStorage)
      .filter(k => k.includes('storybook') && (k.includes('layout') || k.includes('ui')))
      .forEach(k => localStorage.removeItem(k));
    localStorage.removeItem('@storybook/manager/store');
  } catch(e) {}

  /* ── Panel DOM patches ── */
  (function() {
    var HINT_ATTR = 'data-sb-hint-injected';

    var INSTRUCTIONS = {
      controls: 'Controls let you change the props passed into a story without editing code. Tweak values here to see the canvas update live — these changes are temporary and not saved to source.',
      actions:  'Actions captures event callbacks (e.g. onClick, onChange) fired by the component. Click or interact with the story in the canvas above and each event will be logged here.'
    };

    function patch() {
      /* ── 1. Hide the two panel icon buttons by their exact titles ── */
      [
        'Change addon orientation',
        'Hide addons',
        'Addon orientation',
        'Close addons',
      ].forEach(function(t) {
        document.querySelectorAll('[title*="' + t + '"]').forEach(function(el) {
          el.style.setProperty('display', 'none', 'important');
        });
      });
      /* Also hide their wrapper div (sibling of tablist) */
      var tablist0 = document.querySelector('[role="tablist"]');
      if (tablist0 && tablist0.parentElement) {
        Array.prototype.forEach.call(tablist0.parentElement.children, function(child) {
          if (child !== tablist0) child.style.setProperty('display', 'none', 'important');
        });
      }
      var tablist = document.querySelector('[role="tablist"]');
      if (tablist) {
        var parent = tablist.parentElement;
        if (parent) {
          Array.prototype.forEach.call(parent.children, function(child) {
            if (child !== tablist) {
              child.style.setProperty('display', 'none', 'important');
            }
          });
          parent.style.setProperty('display', 'flex', 'important');
          parent.style.setProperty('width', '100%', 'important');
          tablist.style.setProperty('flex', '1', 'important');
          tablist.style.setProperty('display', 'flex', 'important');
          tablist.style.setProperty('width', '100%', 'important');
          tablist.style.setProperty('overflow', 'hidden', 'important');
        }

        /* ── 2. Kill padding on grandparent containers causing right gap ── */
        var el = tablist.parentElement;
        for (var i = 0; i < 4 && el && el !== document.body; i++) {
          el.style.setProperty('padding', '0', 'important');
          el.style.setProperty('margin', '0', 'important');
          el.style.setProperty('width', '100%', 'important');
          el = el.parentElement;
        }

        /* ── 3. Full-width tabs + blue active color + hide count badge ── */
        tablist.querySelectorAll('[role="tab"]').forEach(function(tab) {
          tab.style.setProperty('flex', '1', 'important');
          tab.style.setProperty('justify-content', 'center', 'important');
          tab.style.setProperty('min-width', '0', 'important');
          tab.style.setProperty('border', 'none', 'important');
          tab.style.setProperty('border-bottom', 'none', 'important');
          tab.style.setProperty('box-shadow', 'none', 'important');
          /* Active tab — force blue text */
          var isActive = tab.getAttribute('aria-selected') === 'true'
            || tab.className.includes('tabbutton-active');
          tab.style.setProperty('color', isActive ? '#029cfd' : 'rgba(232,232,237,0.40)', 'important');
          tab.style.setProperty('background', isActive ? 'rgba(2,156,253,0.06)' : 'transparent', 'important');
          /* Count badge is a div/span containing only a number */
          tab.querySelectorAll('div, span').forEach(function(el) {
            if (/^\d+$/.test((el.textContent || '').trim())) {
              el.style.setProperty('display', 'none', 'important');
            }
          });
        });
      }

      /* ── 3. Instruction banners for Controls / Actions panels ── */
      document.querySelectorAll('[id]').forEach(function(el) {
        var id  = el.id.toLowerCase();
        var key = id.includes('control') ? 'controls' : id.includes('action') ? 'actions' : null;
        if (!key) return;
        if (el.getAttribute(HINT_ATTR)) return;
        if (el.getAttribute('role') === 'tab' || el.getAttribute('role') === 'tablist') return;
        if (el.children.length === 0) return;
        el.setAttribute(HINT_ATTR, '1');
        var banner = document.createElement('div');
        banner.setAttribute('data-sb-banner', key);
        banner.style.cssText = [
          'padding:8px 16px',
          'font-size:11px',
          'color:rgba(232,232,237,0.45)',
          'font-family:"Inter",-apple-system,sans-serif',
          'line-height:1.55',
          'border-bottom:1px solid rgba(255,255,255,0.07)',
          'background:transparent',
          'flex-shrink:0',
        ].join(';');
        banner.textContent = INSTRUCTIONS[key];
        el.insertBefore(banner, el.firstChild);
      });
    }

    var timer = null;
    function debouncedPatch() {
      clearTimeout(timer);
      timer = setTimeout(patch, 50);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', patch);
    } else {
      patch();
    }
    var observer = new MutationObserver(debouncedPatch);
    observer.observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>
